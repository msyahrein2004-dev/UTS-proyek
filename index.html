<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Stok Stiker Mauldi - LayerFlow</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .section { margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-in { background: #28a745; margin-right: 5px; }
        .btn-out { background: #dc3545; }
        .btn-refresh { background: #6c757d; float: right; }
        
        /* Gaya Filter Merk */
        .filter-group { margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-filter { background: #e0e0e0; color: #333; padding: 10px 20px; border-radius: 20px; font-size: 14px; transition: 0.3s; }
        .btn-filter.active { background: #1a73e8; color: white; }

        #inputCari {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 16px;
            border: 2px solid #1a73e8;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .input-qty { width: 50px; padding: 7px; margin-right: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-refresh" onclick="muatSemuaData()">Refresh Halaman</button>
    <h1>Dashboard Stok Stiker</h1>

    <div class="section">
        <input type="text" id="inputCari" onkeyup="jalankanFilter()" placeholder="🔍 Cari nama stiker... (contoh: Beat 2025)">
        
        <div class="filter-group">
            <button class="btn btn-filter active" onclick="setFilterMerk('SEMUA', this)">Semua Merk</button>
            <button class="btn btn-filter" onclick="setFilterMerk('HONDA', this)">Honda</button>
            <button class="btn btn-filter" onclick="setFilterMerk('YAMAHA', this)">Yamaha</button>
        </div>
    </div>

    <div class="section">
        <h3>📦 Daftar Stok Produk</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama Stiker</th>
                    <th>Stok</th>
                    <th>Update Stok</th>
                </tr>
            </thead>
            <tbody id="tabel-stok"></tbody>
        </table>
    </div>

    <div class="section">
        <h3>📜 Riwayat Transaksi Terakhir</h3>
        <table style="font-size: 14px;">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama Stiker</th>
                    <th>Tipe</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody id="tabel-riwayat"></tbody>
        </table>
    </div>
</div>

<script>
    let merkAktif = 'SEMUA';

    function setFilterMerk(merk, element) {
        // Ganti tampilan tombol aktif
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        merkAktif = merk;
        jalankanFilter(); // Jalankan penyaringan
    }

    function jalankanFilter() {
        let inputCari = document.getElementById("inputCari").value.toUpperCase();
        let table = document.getElementById("tabel-stok");
        let tr = table.getElementsByTagName("tr");

        for (let i = 0; i < tr.length; i++) {
            let tdNama = tr[i].getElementsByTagName("td")[1];
            if (tdNama) {
                let txtValue = tdNama.textContent || tdNama.innerText;
                let namaBesar = txtValue.toUpperCase();
                
                // Logika: Harus cocok dengan ketikan DAN cocok dengan filter merk
                let cocokNama = namaBesar.indexOf(inputCari) > -1;
                let cocokMerk = (merkAktif === 'SEMUA') || namaBesar.includes(merkAktif);

                if (cocokNama && cocokMerk) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }

    function muatSemuaData() {
        fetch('http://localhost:3000/lihat-stok')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => {
                    let warnaStok = item.stok_saat_ini < 10 ? 'red' : 'black';
                    let tebal = item.stok_saat_ini < 10 ? 'bold' : 'normal';

                    html += `<tr>
                        <td>${item.id}</td>
                        <td><strong>${item.nama_stiker}</strong></td>
                        <td style="color: ${warnaStok}; font-weight: ${tebal}">${item.stok_saat_ini}</td>
                        <td>
                            <input type="number" id="qty-${item.id}" value="1" min="1" class="input-qty">
                            <button class="btn btn-in" onclick="prosesUpdate(${item.id}, 'IN')">+</button>
                            <button class="btn btn-out" onclick="prosesUpdate(${item.id}, 'OUT')">-</button>
                        </td>
                    </tr>`;
                });
                document.getElementById('tabel-stok').innerHTML = html;
                jalankanFilter(); // Supaya filter tetap jalan setelah refresh
            });

        fetch('http://localhost:3000/laporan-transaksi')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(t => {
                    let warna = t.tipe === 'IN' ? 'green' : 'red';
                    html += `<tr>
                        <td>${new Date(t.waktu).toLocaleString('id-ID')}</td>
                        <td>${t.nama_stiker}</td>
                        <td style="color:${warna}; font-weight:bold">${t.tipe}</td>
                        <td>${t.jumlah} Pcs</td>
                    </tr>`;
                });
                document.getElementById('tabel-riwayat').innerHTML = html;
            });
    }

    function prosesUpdate(id, tipe) {
        let qtyInput = document.getElementById(`qty-${id}`);
        let jumlah = parseInt(qtyInput.value);

        if (isNaN(jumlah) || jumlah <= 0) {
            alert("Masukkan jumlah yang benar!");
            return;
        }

        fetch('http://localhost:3000/transaksi', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: id, tipe: tipe, jumlah: jumlah })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            qtyInput.value = 1;
            muatSemuaData(); 
        });
    }

    muatSemuaData();
</script>

</body>
</html>
